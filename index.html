<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポーカー収支計算</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
}

h2 {
  text-align: center;
}

/* 横スクロール防止 */
.table-wrap {
  overflow-x: hidden;
}

/* テーブル */
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

input {
  width: 100%;
  font-size: 16px;
  box-sizing: border-box;
}

/* リバイ回数の列だけ細くする */
th.rebuy,
td.rebuy {
  width: 60px;
  min-width: 50px;
}

td.rebuy input {
  padding: 2px;
  font-size: 14px;
  text-align: center;
}

/* スマホ最適化 */
@media (max-width: 600px) {
  th, td {
    padding: 4px;
    font-size: 12px;
  }
}

/* 色 */
.plus { color: green; font-weight: bold; }
.minus { color: red; font-weight: bold; }
.zero { color: black; }

button {
  width: 100%;
  padding: 10px;
  font-size: 16px;
  margin-top: 10px;
}

.summary {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>ポーカー収支計算</h2>

レート：
<input type="number" id="rate" value="1" oninput="calc()">
リバイ点数：
<input type="number" id="rebuyPoint" value="1000" oninput="calc()">
場代：
<input type="number" id="tableFee" value="0" oninput="calc()">

<button onclick="addRow()">＋ プレイヤー追加</button>

<div class="table-wrap">
<table id="table">
  <thead>
    <tr>
      <th>名前</th>
      <th>最終持ち点</th>
      <th class="rebuy">リバイ回数</th>
      <th>収支</th>
      <th>削除</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

<div class="summary" id="summary"></div>

<script>
let maxPlayers = 10;

function addRow() {
  const table = document.querySelector("#table tbody");
  if (table.rows.length >= maxPlayers) return;

  const row = table.insertRow();
  row.innerHTML = `
    <td><input></td>
    <td><input type="number" value="0" oninput="calc()"></td>
    <td class="rebuy"><input type="number" value="0" oninput="calc()"></td>
    <td class="result">0</td>
    <td><button onclick="this.closest('tr').remove(); calc();">✖</button></td>
  `;
}

function calc() {
  const rate = Number(document.getElementById("rate").value) || 0;
  const rebuyPoint = Number(document.getElementById("rebuyPoint").value) || 0;
  const tableFee = Number(document.getElementById("tableFee").value) || 0;

  const rows = document.querySelectorAll("#table tbody tr");
  const players = rows.length;

  let totalPoint = 0;
  let totalRebuy = 0;

  const feePerPerson = players > 0
    ? Math.ceil((tableFee / players) / 10) * 10
    : 0;

  rows.forEach(row => {
    const point = Number(row.cells[1].querySelector("input").value) || 0;
    const rebuy = Number(row.cells[2].querySelector("input").value) || 0;

    totalPoint += point;
    totalRebuy += rebuy;

    const result = point * rate - rebuy * rebuyPoint * rate - feePerPerson;

    const cell = row.cells[3];
    cell.textContent = (result > 0 ? "+" : "") + result;
    cell.className = "result " + (result > 0 ? "plus" : result < 0 ? "minus" : "zero");
  });

  const rebuyTotalPoint = totalRebuy * rebuyPoint;

  let checkMsg = "";
  if (totalPoint === rebuyTotalPoint) {
    checkMsg = "OK";
  } else if (totalPoint > rebuyTotalPoint) {
    checkMsg = `持ち点が +${totalPoint - rebuyTotalPoint} 点多い`;
  } else {
    checkMsg = `リバイ側が +${rebuyTotalPoint - totalPoint} 点多い`;
  }

  document.getElementById("summary").innerHTML = `
    人数：${players}人<br>
    持ち点合計：${totalPoint}<br>
    リバイ合計：${totalRebuy}<br>
    判定：${checkMsg}<br>
    場代（1人）：${feePerPerson}円
  `;
}

for (let i = 0; i < 3; i++) addRow();
calc();
</script>

</body>
</html>
