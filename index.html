<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポーカー収支計算</title>

<style>
body {
  font-family: sans-serif;
  padding: 10px;
}

h2 {
  text-align: center;
}

/* ===== ハンバーガーメニュー ===== */
.menu-wrapper {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 1000;
}

.menu-button {
  font-size: 28px;
  background: none;
  border: none;
  cursor: pointer;
}

.menu {
  display: none;
  margin-top: 5px;
  background: #f4f4f4;
  border: 1px solid #ccc;
  border-radius: 6px;
  padding: 8px;
  width: 180px;
}

.menu.open {
  display: block;
}

.menu input,
.menu select,
.menu button {
  width: 100%;
  margin-bottom: 6px;
  font-size: 14px;
}

/* ===== テーブル ===== */
table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
}

input {
  width: 100%;
  font-size: 16px;
  box-sizing: border-box;
}

th.rebuy,
td.rebuy {
  width: 60px;
}

.plus { color: green; font-weight: bold; }
.minus { color: red; font-weight: bold; }
.zero { color: black; }

.summary {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- ===== ハンバーガーメニュー ===== -->
<div class="menu-wrapper">
  <button class="menu-button" onclick="toggleMenu()">☰</button>
  <div class="menu" id="menu">
    <input id="sessionName" placeholder="データ名">
    <button onclick="saveSession()">💾 保存</button>
    <button onclick="newSession()">🆕 新規</button>
    <select id="sessionList" onchange="loadSelected()">
      <option value="">📂 過去データ</option>
    </select>
    <button onclick="deleteSession()">🗑 データ削除</button>
  </div>
</div>

<h2>ポーカー収支計算</h2>

レート：
<input type="number" id="rate" value="1" oninput="calc()">
リバイ点数：
<input type="number" id="rebuyPoint" value="1000" oninput="calc()">
場代：
<input type="number" id="tableFee" value="0" oninput="calc()">

<button onclick="addRow()">＋ プレイヤー追加</button>

<table id="table">
<thead>
<tr>
  <th>名前</th>
  <th>最終持ち点</th>
  <th class="rebuy">リバイ</th>
  <th>収支</th>
  <th>削除</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="summary" id="summary"></div>

<script>
let sessions = JSON.parse(localStorage.getItem("pokerSessions") || "{}");

/* ===== メニュー操作 ===== */
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}

/* ===== 基本要素 ===== */
const rate = document.getElementById("rate");
const rebuyPoint = document.getElementById("rebuyPoint");
const tableFee = document.getElementById("tableFee");
const sessionName = document.getElementById("sessionName");
const sessionList = document.getElementById("sessionList");
const summary = document.getElementById("summary");
const table = document.getElementById("table");

/* ===== 行追加 ===== */
function addRow(data = {}) {
  const row = table.tBodies[0].insertRow();
  row.innerHTML = `
    <td><input value="${data.name || ""}"></td>
    <td><input type="number" value="${data.point || 0}" oninput="calc()"></td>
    <td class="rebuy"><input type="number" value="${data.rebuy || 0}" oninput="calc()"></td>
    <td class="result">0</td>
    <td><button onclick="this.closest('tr').remove(); calc();">✖</button></td>
  `;
}

/* ===== 計算 ===== */
function calc() {
  const rows = table.tBodies[0].rows;
  const players = rows.length;
  let totalPoint = 0;
  let totalRebuy = 0;

  const fee = players
    ? Math.ceil((tableFee.value / players) / 10) * 10
    : 0;

  [...rows].forEach(r => {
    const p = +r.cells[1].firstChild.value || 0;
    const rb = +r.cells[2].firstChild.value || 0;
    totalPoint += p;
    totalRebuy += rb;

    const res = p * rate.value - rb * rebuyPoint.value * rate.value - fee;
    const c = r.cells[3];
    c.textContent = (res > 0 ? "+" : "") + res;
    c.className = res > 0 ? "plus" : res < 0 ? "minus" : "zero";
  });

  const rebuyTotal = totalRebuy * rebuyPoint.value;
  const judge =
    totalPoint === rebuyTotal ? "OK" :
    totalPoint > rebuyTotal ? `持ち点 +${totalPoint - rebuyTotal}` :
    `リバイ側 +${rebuyTotal - totalPoint}`;

  summary.innerHTML = `
    人数：${players}人<br>
    持ち点合計：${totalPoint}<br>
    リバイ合計：${totalRebuy}<br>
    判定：${judge}<br>
    場代（1人）：${fee}円
  `;
}

/* ===== 保存 ===== */
function saveSession() {
  const name = sessionName.value.trim();
  if (!name) return alert("データ名を入力してください");

  sessions[name] = {
    rate: rate.value,
    rebuyPoint: rebuyPoint.value,
    tableFee: tableFee.value,
    players: [...table.tBodies[0].rows].map(r => ({
      name: r.cells[0].firstChild.value,
      point: r.cells[1].firstChild.value,
      rebuy: r.cells[2].firstChild.value
    }))
  };

  localStorage.setItem("pokerSessions", JSON.stringify(sessions));
  refreshList();
  alert("保存しました");
}

/* ===== 読込 ===== */
function loadSelected() {
  const name = sessionList.value;
  if (!sessions[name]) return;

  table.tBodies[0].innerHTML = "";
  const d = sessions[name];
  rate.value = d.rate;
  rebuyPoint.value = d.rebuyPoint;
  tableFee.value = d.tableFee;
  d.players.forEach(p => addRow(p));
  sessionName.value = name;
  calc();
}

/* ===== 削除 ===== */
function deleteSession() {
  const name = sessionName.value.trim();
  if (!sessions[name]) return alert("削除対象がありません");
  if (!confirm(`「${name}」を削除しますか？`)) return;

  delete sessions[name];
  localStorage.setItem("pokerSessions", JSON.stringify(sessions));
  newSession();
  refreshList();
  alert("削除しました");
}

/* ===== 新規 ===== */
function newSession() {
  table.tBodies[0].innerHTML = "";
  for (let i = 0; i < 3; i++) addRow();
  sessionName.value = new Date().toISOString().slice(0, 10);
  calc();
}

/* ===== 一覧更新 ===== */
function refreshList() {
  sessionList.innerHTML = `<option value="">📂 過去データ</option>`;
  Object.keys(sessions).forEach(k => {
    const o = document.createElement("option");
    o.value = o.textContent = k;
    sessionList.appendChild(o);
  });
}

/* ===== 初期化 ===== */
newSession();
refreshList();
</script>

</body>
</html>
